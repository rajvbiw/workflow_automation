apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rajbirari9737/workflow-automation-backend:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "npm run dev"]
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: app-secrets
