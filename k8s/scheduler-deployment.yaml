apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: rajbirari9737/workflow-automation-backend:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "npm run scheduler"]
          envFrom:
            - secretRef:
                name: app-secrets
