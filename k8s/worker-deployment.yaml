apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: rajbirari9737/workflow-automation-backend:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "npm run worker"]
          envFrom:
            - secretRef:
                name: app-secrets
